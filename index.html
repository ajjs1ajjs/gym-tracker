<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymProgress - Тренування</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>💪 Тренування</h1>
            <div class="header-actions">
                <button class="btn-reset" onclick="resetProgress()">Скинути</button>
            </div>
        </div>
        <p class="subtitle">Обери групу м'язів та відмічай виконані вправи</p>
        
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-value" id="total-exercises">0</span>
                <span class="stat-label">Всього вправ</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="completed-exercises">0</span>
                <span class="stat-label">Виконано</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="progress-percent">0%</span>
                <span class="stat-label">Прогрес</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="total-workouts">0</span>
                <span class="stat-label">Тренувань</span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>Групи м'язів</h3>
            <div class="muscle-groups" id="muscle-groups"></div>
        </aside>

        <main>
            <div class="exercises-wrapper" id="exercises-list"></div>
        </main>
    </div>

    <div class="modal" id="exercise-modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="" alt="">
            <h2 id="modal-title"></h2>
            <div class="modal-meta">
                <span class="muscle-tag" id="modal-muscle"></span>
                <span class="difficulty-tag" id="modal-difficulty"></span>
            </div>
            <p class="modal-description" id="modal-description"></p>
            <div class="modal-instructions">
                <h4>Як виконувати:</h4>
                <ul id="modal-instructions"></ul>
            </div>
            <div class="modal-sets">
                <h4>Підходи та повтори:</h4>
                <p id="modal-sets"></p>
            </div>
            <div class="modal-checkin">
                <button id="modal-checkin-btn" onclick="toggleFromModal()">✓ Відмітити виконаним</button>
                <p class="checkin-date" id="checkin-date"></p>
            </div>
        </div>
    </div>

    <script src="app.js?v=20260302-1"></script>
</body>
</html>
